name: BUILD IPA - EXPO FIX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================
      # CHECKOUT
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================
      # SETUP NODE 20
      # ============================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================
      # FIX APP.JSON
      # ============================================
      - name: Fix app.json
        run: |
          cat > app.json << 'EOF'
        {
          "expo": {
            "name": "gymapp2",
            "slug": "gymapp2",
            "version": "1.0.0",
            "platforms": ["ios", "web"],
            "ios": {
              "bundleIdentifier": "com.yourcompany.gymapp2",
              "supportsTablet": true
            }
          }
        }
        EOF
          cat app.json

      # ============================================
      # INSTALL DEPENDENCIES
      # ============================================
      - name: Install dependencies
        run: |
          export CI=1
          npm install --force

      # ============================================
      # GENERATE IOS FOLDER
      # ============================================
      - name: Generate iOS folder
        run: |
          export CI=1
          export EXPO_NO_INTERACTIVE=1
          
          rm -rf ios
          rm -rf node_modules/.cache
          
          echo "y" | npx expo prebuild --platform ios --clean || echo "Prebuild failed"
          
          if [ ! -d "ios" ]; then
            echo "Creating iOS folder manually..."
            mkdir -p ios
          fi

      # ============================================
      # FIX EXPO MODULES JSI ERROR
      # ============================================
      - name: Fix ExpoModulesJSI error
        run: |
          cd ios || exit 1
          
          # Remove problematic Pods
          rm -rf Pods
          rm -f Podfile.lock
          
          # Create a fixed Podfile
          cat > Podfile << 'EOF'
        require File.join(File.dirname(`node --print "require.resolve('expo/package.json')"`), "scripts/autolinking")
        require File.join(File.dirname(`node --print "require.resolve('react-native/package.json')"`), "scripts/react_native_pods")
        require File.join(File.dirname(`node --print "require.resolve('@react-native-community/cli-platform-ios/package.json')"`), "native_modules")
        
        platform :ios, '13.0'
        install! 'cocoapods', :deterministic_uuids => false
        
        target 'gymapp2' do
          use_expo_modules!
          config = use_native_modules!
          
          use_react_native!(
            :path => config[:reactNativePath],
            :hermes_enabled => true,
            :fabric_enabled => false,
            :flipper_configuration => FlipperConfiguration.enabled(false)
          )
          
          post_install do |installer|
            react_native_post_install(installer)
            
            # Fix for ExpoModulesJSI
            installer.pods_project.targets.each do |target|
              if target.name == 'ExpoModulesJSI'
                target.build_configurations.each do |config|
                  config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
                  config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << 'EXPO_MODULES_JSI_FIX=1'
                end
              end
            end
          end
        end
        EOF
          
          cd ..

      # ============================================
      # INSTALL PODS WITH FIX
      # ============================================
      - name: Install Pods
        run: |
          sudo gem install cocoapods
          cd ios || exit 1
          pod install --repo-update || pod install --verbose
          cd ..

      # ============================================
      # BUILD IOS APP
      # ============================================
      - name: Build iOS app
        run: |
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "Building workspace: $WORKSPACE with scheme: $SCHEME"
            
            # Build with specific flags to avoid ExpoModulesJSI error
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO GCC_PREPROCESSOR_DEFINITIONS='$(inherited) EXPO_MODULES_JSI_FIX=1'
          else
            echo "No workspace found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================
      # PACKAGE IPA
      # ============================================
      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r gymapp2-unsigned.ipa Payload/
          echo "IPA created!"

      # ============================================
      # UPLOAD IPA
      # ============================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================
      # DEBUG ON FAILURE
      # ============================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Debug Information ==="
          echo "Directory structure:"
          ls -laR
          echo "=== app.json ==="
          cat app.json 2>/dev/null || echo "No app.json"
          echo "=== iOS folder ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "=== Pods error log ==="
          cat ios/Pods/Pods.xcodeproj/project.pbxproj 2>/dev/null | head -50
