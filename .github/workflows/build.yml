name: BUILD IPA - EXPO FIX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================
      # CHECKOUT
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================
      # SETUP NODE 20
      # ============================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================
      # FIX APP.JSON
      # ============================================
      - name: Fix app.json
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          cat app.json

      # ============================================
      # INSTALL DEPENDENCIES
      # ============================================
      - name: Install dependencies
        run: |
          export CI=1
          npm install --force

      # ============================================
      # GENERATE IOS FOLDER
      # ============================================
      - name: Generate iOS folder
        run: |
          export CI=1
          export EXPO_NO_INTERACTIVE=1
          
          rm -rf ios
          rm -rf node_modules/.cache
          
          echo "y" | npx expo prebuild --platform ios --clean || echo "Prebuild failed"
          
          if [ ! -d "ios" ]; then
            echo "Creating iOS folder manually..."
            mkdir -p ios
          fi

      # ============================================
      # FIX EXPO MODULES JSI ERROR - CREATE PODFILE
      # ============================================
      - name: Create fixed Podfile
        run: |
          cd ios || exit 1
          
          rm -rf Pods
          rm -f Podfile.lock
          
          # Write Podfile using echo commands instead of heredoc
          echo 'require File.join(File.dirname(`node --print "require.resolve('\''expo/package.json'\'')"`), "scripts/autolinking")' > Podfile
          echo 'require File.join(File.dirname(`node --print "require.resolve('\''react-native/package.json'\'')"`), "scripts/react_native_pods")' >> Podfile
          echo 'require File.join(File.dirname(`node --print "require.resolve('\''@react-native-community/cli-platform-ios/package.json'\'')"`), "native_modules")' >> Podfile
          echo '' >> Podfile
          echo "platform :ios, '13.0'" >> Podfile
          echo "install! 'cocoapods', :deterministic_uuids => false" >> Podfile
          echo '' >> Podfile
          echo "target 'gymapp2' do" >> Podfile
          echo "  use_expo_modules!" >> Podfile
          echo "  config = use_native_modules!" >> Podfile
          echo '' >> Podfile
          echo "  use_react_native!(" >> Podfile
          echo "    :path => config[:reactNativePath]," >> Podfile
          echo "    :hermes_enabled => true," >> Podfile
          echo "    :fabric_enabled => false," >> Podfile
          echo "    :flipper_configuration => FlipperConfiguration.enabled(false)" >> Podfile
          echo "  )" >> Podfile
          echo '' >> Podfile
          echo "  post_install do |installer|" >> Podfile
          echo "    react_native_post_install(installer)" >> Podfile
          echo '    installer.pods_project.targets.each do |target|' >> Podfile
          echo "      if target.name == 'ExpoModulesJSI'" >> Podfile
          echo "        target.build_configurations.each do |config|" >> Podfile
          echo "          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']" >> Podfile
          echo "          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << 'EXPO_MODULES_JSI_FIX=1'" >> Podfile
          echo "        end" >> Podfile
          echo "      end" >> Podfile
          echo "    end" >> Podfile
          echo "  end" >> Podfile
          echo "end" >> Podfile
          
          cat Podfile
          cd ..

      # ============================================
      # INSTALL PODS WITH FIX
      # ============================================
      - name: Install Pods
        run: |
          sudo gem install cocoapods
          cd ios || exit 1
          pod install --repo-update || pod install --verbose
          cd ..

      # ============================================
      # BUILD IOS APP
      # ============================================
      - name: Build iOS app
        run: |
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "Building workspace: $WORKSPACE with scheme: $SCHEME"
            
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO GCC_PREPROCESSOR_DEFINITIONS='$(inherited) EXPO_MODULES_JSI_FIX=1'
          else
            echo "No workspace found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================
      # PACKAGE IPA
      # ============================================
      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r gymapp2-unsigned.ipa Payload/
          echo "IPA created!"

      # ============================================
      # UPLOAD IPA
      # ============================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================
      # DEBUG ON FAILURE
      # ============================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Debug Information ==="
          echo "Directory structure:"
          ls -laR
          echo "=== app.json ==="
          cat app.json 2>/dev/null || echo "No app.json"
          echo "=== iOS folder ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "=== Podfile ==="
          cat ios/Podfile 2>/dev/null || echo "No Podfile"
