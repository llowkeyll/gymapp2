name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
      
      - name: Build iOS App
        run: |
          xcodebuild -workspace YourApp.xcworkspace -scheme YourApp -configuration Release -derivedDataPath build -sdk iphoneos
      
      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/YourApp.app Payload/
          zip -r YourApp.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: YourApp
          path: YourApp.ipa
