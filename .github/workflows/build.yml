name: Build with Expo Local Builder

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Install Expo
        run: npm install -g expo-cli

      - name: Build with Expo
        run: |
          # This uses the local builder
          npx expo build:ios --non-interactive --no-wait --local
          # The --local flag ensures it builds on the runner, not on EAS servers
          
          # Wait for build to complete
          sleep 60
          
          # Find and package the IPA
          find . -name "*.ipa" -type f

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-ipa
          path: "*.ipa"
          compression-level: 9
          retention-days: 7
