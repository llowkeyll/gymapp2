name: BUILD IPA - NO QUESTIONS ASKED

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================
      # CHECKOUT
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================
      # SETUP NODE 20
      # ============================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================
      # FIX APP.JSON - ADD IOS PLATFORM
      # ============================================
      - name: Fix app.json to include iOS
        run: |
          if [ -f "app.json" ]; then
            echo "Fixing app.json..."
            # Create a new app.json with proper iOS config
            cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          else
            echo "Creating app.json..."
            cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          fi
          
          echo "app.json contents:"
          cat app.json

      # ============================================
      # INSTALL DEPENDENCIES - FORCE MODE
      # ============================================
      - name: Install dependencies
        run: |
          export CI=1
          npm install --force

      # ============================================
      # GENERATE IOS FOLDER - WITH YES TO ALL PROMPTS
      # ============================================
      - name: Generate iOS folder
        run: |
          export CI=1
          export EXPO_NO_INTERACTIVE=1
          
          rm -rf ios
          rm -rf node_modules/.cache
          
          echo "y" | npx expo prebuild --platform ios --clean || echo "Prebuild failed, continuing..."
          
          if [ ! -d "ios" ]; then
            echo "Expo prebuild failed, using React Native init..."
            npx react-native init temp_ios --version 0.85.3 --skip-install
            cp -R temp_ios/ios ./
            cp -R temp_ios/ios/* ios/ 2>/dev/null || true
            rm -rf temp_ios
          fi
          
          if [ ! -d "ios" ]; then
            echo "Creating manual iOS folder..."
            mkdir -p ios
            cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'
          require_relative '../node_modules/@react-native-community/cli-platform-ios/native_modules'
          
          target 'gymapp2' do
            config = use_native_modules!
            use_react_native!(:path => config["reactNativePath"])
            
            post_install do |installer|
              react_native_post_install(installer)
            end
          end
          EOF
          fi

      # ============================================
      # VERIFY IOS FOLDER
      # ============================================
      - name: Verify iOS folder
        run: |
          if [ -d "ios" ]; then
            echo "iOS folder exists!"
            ls -la ios/
          else
            echo "iOS folder missing!"
            exit 1
          fi

      # ============================================
      # INSTALL PODS
      # ============================================
      - name: Install Pods
        run: |
          sudo gem install cocoapods
          cd ios || exit 1
          rm -f Podfile.lock
          pod install --repo-update || pod install --verbose
          cd ..

      # ============================================
      # FIND WORKSPACE AND BUILD
      # ============================================
      - name: Build iOS app
        run: |
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "Building workspace: $WORKSPACE"
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          elif [ -n "$PROJECT" ]; then
            SCHEME=$(basename "$PROJECT" .xcodeproj)
            echo "Building project: $PROJECT"
            xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          else
            echo "No iOS project found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================
      # FIND AND PACKAGE APP
      # ============================================
      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r gymapp2-unsigned.ipa Payload/

      # ============================================
      # UPLOAD IPA
      # ============================================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================
      # DEBUG ON FAILURE
      # ============================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Debug Information ==="
          echo "Directory structure:"
          ls -laR
          echo "=== app.json ==="
          cat app.json 2>/dev/null || echo "No app.json"
          echo "=== package.json ==="
          cat package.json | head -30
          echo "=== iOS folder ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
