name: SIGN IPA ONLY

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-latest
    
    steps:
      # ============================================================
      # STEP 1: CHECKOUT CODE
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================================
      # STEP 2: LIST FILES (DEBUG)
      # ============================================================
      - name: List files
        run: |
          echo "=== Files in repository ==="
          ls -la

      # ============================================================
      # STEP 3: DOWNLOAD ZSIGN
      # ============================================================
      - name: Download zsign
        run: |
          wget https://github.com/zhlynn/zsign/releases/latest/download/zsign-macos -O zsign
          chmod +x zsign

      # ============================================================
      # STEP 4: DECODE CERTIFICATE FROM SECRETS
      # ============================================================
      - name: Decode certificate and profile
        run: |
          echo "${{ secrets.CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          
          echo "=== Certificate and profile decoded ==="
          ls -la certificate.p12 profile.mobileprovision

      # ============================================================
      # STEP 5: FIND THE UNSIGNED IPA IN ROOT
      # ============================================================
      - name: Find IPA
        run: |
          # Look for any .ipa file in the root (excluding signed ones)
          IPA_FILE=$(ls *.ipa 2>/dev/null | grep -v "signed" | head -1)
          
          if [ -z "$IPA_FILE" ]; then
            echo "❌ No IPA file found in root!"
            echo "Please make sure your unsigned IPA is in the repository root"
            echo "Files found:"
            ls -la *.ipa 2>/dev/null || echo "No .ipa files found"
            exit 1
          fi
          
          echo "Found IPA: $IPA_FILE"
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV

      # ============================================================
      # STEP 6: SIGN THE IPA
      # ============================================================
      - name: Sign IPA
        run: |
          echo "Signing: ${{ env.IPA_FILE }}"
          ./zsign -k "certificate.p12" -p "${{ secrets.CERT_PASSWORD }}" -m "profile.mobileprovision" -o "gymapp2-signed.ipa" "${{ env.IPA_FILE }}"
          
          echo "=== Signed IPA created ==="
          ls -la gymapp2-signed.ipa

      # ============================================================
      # STEP 7: UPLOAD SIGNED IPA
      # ============================================================
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-signed-ipa
          path: gymapp2-signed.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 8: SUCCESS MESSAGE
      # ============================================================
      - name: Sign complete!
        if: success()
        run: |
          echo "=================================================="
          echo "🎉 IPA SIGNED SUCCESSFULLY! 🎉"
          echo "=================================================="
          echo "📦 gymapp2-signed-ipa is ready to download!"
          echo "=================================================="
          echo "NEXT STEPS:"
          echo "1. Download gymapp2-signed-ipa from artifacts"
          echo "2. AirDrop to your iPhone"
          echo "3. Open with AltStore"
          echo "4. Tap Install"
          echo "=================================================="

      # ============================================================
      # STEP 9: DEBUG ON FAILURE
      # ============================================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "=================================================="
          echo "❌ SIGNING FAILED ❌"
          echo "=================================================="
          echo "=== Files in root ==="
          ls -la
          echo "=== Certificate files ==="
          ls -la *.p12 2>/dev/null || echo "No .p12 file"
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision file"
          echo "=== IPA files ==="
          ls -la *.ipa 2>/dev/null || echo "No .ipa files"
          echo "=================================================="
