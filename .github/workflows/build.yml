name: Build iOS IPA (Foolproof)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # Step 1: Checkout WITHOUT submodules to avoid the error
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # Step 2: Debug - show what we have
      - name: List files
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== iOS directory ==="
          ls -la ios/ || echo "No ios folder"
          echo "=== Package.json ==="
          cat package.json | head -20 || echo "No package.json"

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          # Ensure React Native CLI is installed
          npm install --save-dev @react-native-community/cli

      # Step 5: Bundle JavaScript
      - name: Bundle JavaScript
        run: |
          # Try multiple entry points
          if [ -f "index.js" ]; then
            ENTRY_FILE="index.js"
          elif [ -f "index.android.js" ]; then
            ENTRY_FILE="index.android.js"
          else
            ENTRY_FILE="index.js"
          fi
          
          echo "Using entry file: $ENTRY_FILE"
          
          # Use npx with the local CLI
          npx react-native bundle --entry-file $ENTRY_FILE --bundle-output ios/main.jsbundle --platform ios --dev false

      # Step 6: Install iOS Pods
      - name: Install iOS Pods
        run: |
          cd ios
          # Remove Podfile.lock to avoid conflicts
          rm -f Podfile.lock
          # Install pods
          pod install --repo-update || pod install
          cd ..

      # Step 7: Build iOS app
      - name: Build iOS app
        run: |
          cd ios
          
          # Find workspace or project file
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME="${WORKSPACE%.xcworkspace}"
            echo "Building workspace: $WORKSPACE with scheme: $SCHEME"
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          elif [ -n "$PROJECT" ]; then
            SCHEME="${PROJECT%.xcodeproj}"
            echo "Building project: $PROJECT with scheme: $SCHEME"
            xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          else
            echo "No iOS project found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # Step 8: Find and package the .app
      - name: Package IPA
        run: |
          # Find the built app
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Searching for .app in all directories..."
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create Payload folder and copy app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Create IPA
          zip -r gymapp2.ipa Payload/
          echo "IPA created successfully!"

      # Step 9: Upload the IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-ipa
          path: gymapp2.ipa
          compression-level: 9
          retention-days: 7

      # Step 10: Upload debug info if build fails
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build/Logs/
            ios/build/**/*.log
            ios/Pods/
