name: SIGN IPA - USE ACTUAL FILES

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-latest
    
    steps:
      # ============================================================
      # STEP 1: CHECKOUT CODE
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================================
      # STEP 2: LIST ALL FILES
      # ============================================================
      - name: List all files
        run: |
          echo "=========================================="
          echo "FILES IN REPOSITORY:"
          echo "=========================================="
          ls -la
          echo "=========================================="
          echo "CERTIFICATE FILES:"
          ls -la *.p12 2>/dev/null || echo "No .p12 files"
          echo "=========================================="
          echo "PROFILE FILES:"
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files"
          echo "=========================================="
          echo "IPA FILES:"
          ls -la *.ipa 2>/dev/null || echo "No .ipa files"
          echo "=========================================="

      # ============================================================
      # STEP 3: DOWNLOAD ZSIGN
      # ============================================================
      - name: Download zsign
        run: |
          echo "=== DOWNLOADING ZSIGN ==="
          curl -L -o zsign https://github.com/zhlynn/zsign/releases/latest/download/zsign-macos
          chmod +x zsign
          ls -la zsign

      # ============================================================
      # STEP 4: FIND CERTIFICATE FILE
      # ============================================================
      - name: Find certificate
        id: find_cert
        run: |
          echo "=== FINDING CERTIFICATE ==="
          
          # Look for the actual certificate file
          CERT_FILE=$(ls *.p12 2>/dev/null | head -1)
          
          if [ -z "$CERT_FILE" ]; then
            echo "❌ No .p12 file found!"
            exit 1
          fi
          
          echo "✅ Found certificate: $CERT_FILE"
          echo "CERT_FILE=$CERT_FILE" >> $GITHUB_ENV
          ls -la "$CERT_FILE"

      # ============================================================
      # STEP 5: FIND PROVISIONING PROFILE
      # ============================================================
      - name: Find provisioning profile
        id: find_profile
        run: |
          echo "=== FINDING PROVISIONING PROFILE ==="
          
          # Look for the actual profile file
          PROFILE_FILE=$(ls *.mobileprovision 2>/dev/null | head -1)
          
          if [ -z "$PROFILE_FILE" ]; then
            echo "❌ No .mobileprovision file found!"
            exit 1
          fi
          
          echo "✅ Found profile: $PROFILE_FILE"
          echo "PROFILE_FILE=$PROFILE_FILE" >> $GITHUB_ENV
          ls -la "$PROFILE_FILE"

      # ============================================================
      # STEP 6: FIND IPA
      # ============================================================
      - name: Find IPA
        id: find_ipa
        run: |
          echo "=== FINDING IPA ==="
          
          # Look for any .ipa file
          IPA_FILE=$(ls *.ipa 2>/dev/null | grep -v "signed" | head -1)
          
          if [ -z "$IPA_FILE" ]; then
            echo "❌ No .ipa file found!"
            exit 1
          fi
          
          echo "✅ Found IPA: $IPA_FILE"
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV
          ls -la "$IPA_FILE"

      # ============================================================
      # STEP 7: SIGN THE IPA
      # ============================================================
      - name: Sign IPA
        run: |
          echo "=========================================="
          echo "SIGNING IPA WITH ACTUAL FILES"
          echo "=========================================="
          echo "Certificate: ${{ env.CERT_FILE }}"
          echo "Profile: ${{ env.PROFILE_FILE }}"
          echo "IPA: ${{ env.IPA_FILE }}"
          echo "=========================================="
          
          # Sign with the actual files
          ./zsign -k "${{ env.CERT_FILE }}" -p "Uhjiply-7643" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "${{ env.IPA_FILE }}"
          
          # Check if signed IPA was created
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ IPA SIGNED SUCCESSFULLY!"
            ls -la gymapp2-signed.ipa
          else
            echo "❌ Signing failed!"
            exit 1
          fi

      # ============================================================
      # STEP 8: UPLOAD SIGNED IPA
      # ============================================================
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-signed-ipa
          path: gymapp2-signed.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 9: SUCCESS MESSAGE
      # ============================================================
      - name: Success
        if: success()
        run: |
          echo "============================================================"
          echo "🎉🎉🎉 IPA SIGNED SUCCESSFULLY! 🎉🎉🎉"
          echo "============================================================"
          echo "📦 gymapp2-signed.ipa is ready to download!"
          echo "============================================================"
          echo "NEXT STEPS:"
          echo "1. Download gymapp2-signed-ipa from Artifacts"
          echo "2. AirDrop to your iPhone"
          echo "3. Open with AltStore"
          echo "4. Tap Install"
          echo "============================================================"

      # ============================================================
      # STEP 10: DEBUG ON FAILURE
      # ============================================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "============================================================"
          echo "❌ SIGNING FAILED ❌"
          echo "============================================================"
          echo "=== FILES IN ROOT ==="
          ls -la
          echo "============================================================"
          echo "=== CERTIFICATE FILE ==="
          ls -la *.p12 2>/dev/null || echo "No .p12 file"
          echo "=== PROFILE FILE ==="
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision file"
          echo "=== IPA FILE ==="
          ls -la *.ipa 2>/dev/null || echo "No .ipa file"
          echo "============================================================"
