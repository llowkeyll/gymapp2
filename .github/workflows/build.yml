name: Build iOS IPA (AltStore)

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  build-ios:
    runs-on: macos-14 # Uses Apple Silicon / Modern Mac
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: Build Unsigned IPA
        run: |
          cd ios
          # Auto-detect the workspace and scheme generated by Expo
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(ls | grep .xcworkspace | head -1 | sed 's/.xcworkspace//')
          
          # Force Xcode to compile the app without Apple Developer signatures
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY=""
            
          # Package the raw app file into an IPA format for AltStore
          mkdir -p Payload
          cp -R build.xcarchive/Products/Applications/*.app Payload/
          zip -r ../app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeightTracker-IPA
          path: app.ipa