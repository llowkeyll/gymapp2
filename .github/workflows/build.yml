name: Build IPA - No Apple Account Required

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # Checkout without submodules
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Install dependencies - FUCK PEER DEPS
      - name: Install dependencies
        run: |
          npm install --force
          # This ignores ALL peer dependency conflicts
          # If npm install --force fails, use:
          # npm install --legacy-peer-deps

      # Install Expo CLI if it's an Expo project
      - name: Install Expo CLI
        run: |
          npm install -g expo-cli || npm install -g expo

      # PREBUILD - Generate the iOS native code (NO ACCOUNT NEEDED)
      - name: Prebuild iOS
        run: |
          # This generates the ios/ folder without needing any Apple account
          npx expo prebuild --platform ios --clean --non-interative --no-install || npx expo run:ios --no-build --no-install || echo "Prebuild failed but continuing"

      # Install CocoaPods (free, no account needed)
      - name: Install iOS Pods
        run: |
          cd ios || exit 1
          rm -f Podfile.lock
          sudo gem install cocoapods
          pod install --repo-update || pod install
          cd ..

      # BUILD THE FUCKING APP - NO SIGNING, NO ACCOUNT
      - name: Build iOS app (unsigned)
        run: |
          cd ios
          
          # Find workspace
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME="${WORKSPACE%.xcworkspace}"
            echo "Building workspace: $WORKSPACE with scheme: $SCHEME"
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO OTHER_SWIFT_FLAGS="-DDEBUG" ONLY_ACTIVE_ARCH=NO
          elif [ -n "$PROJECT" ]; then
            SCHEME="${PROJECT%.xcodeproj}"
            echo "Building project: $PROJECT with scheme: $SCHEME"
            xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO OTHER_SWIFT_FLAGS="-DDEBUG" ONLY_ACTIVE_ARCH=NO
          else
            echo "No iOS project found! Creating one..."
            cd ..
            npx expo run:ios --no-build-cache --no-install || npx react-native run-ios --no-packager
            cd ios
            WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
            if [ -n "$WORKSPACE" ]; then
              SCHEME="${WORKSPACE%.xcworkspace}"
              xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
            else
              echo "Still no iOS project! Exiting..."
              exit 1
            fi
          fi
          
          cd ..

      # FIND THE APP BUNDLE
      - name: Find and package app
        run: |
          # Find the .app file
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No .app found! Build failed."
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Package it
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r gymapp2-unsigned.ipa Payload/
          echo "UNSIGNED IPA created!"

      # UPLOAD THE UNSIGNED IPA
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 7

      # DEBUG - if everything fails
      - name: Debug build failure
        if: failure()
        run: |
          echo "=== Build failed. Here's what we have: ==="
          find . -name "*.app" -type d
          echo "=== iOS directory contents: ==="
          ls -la ios/ || echo "No ios directory"
          echo "=== Available schemes: ==="
          cd ios && xcodebuild -list || echo "No schemes found"
