name: ULTIMATE FOOLPROOF IPA BUILDER + SIGNER

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================================
      # STEP 1: CHECKOUT
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ============================================================
      # STEP 2: LIST ALL FILES (DEBUG)
      # ============================================================
      - name: List all files
        run: |
          echo "=========================================="
          echo "FILES IN REPOSITORY:"
          echo "=========================================="
          ls -la
          echo "=========================================="
          echo "CERTIFICATE FILES:"
          ls -la *.p12 2>/dev/null || echo "No .p12 files found"
          echo "=========================================="
          echo "PROFILE FILES:"
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files found"
          echo "=========================================="

      # ============================================================
      # STEP 3: SETUP NODE 20
      # ============================================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================================
      # STEP 4: INSTALL DEPENDENCIES (TRY 4 METHODS)
      # ============================================================
      - name: Install dependencies (MULTIPLE ATTEMPTS)
        run: |
          echo "ATTEMPT 1: npm install --force"
          npm install --force && echo "✅ INSTALL SUCCESS" || echo "❌ INSTALL FAILED"
          
          if [ $? -ne 0 ]; then
            echo "ATTEMPT 2: npm install --legacy-peer-deps"
            npm install --legacy-peer-deps && echo "✅ INSTALL SUCCESS" || echo "❌ INSTALL FAILED"
          fi
          
          if [ $? -ne 0 ]; then
            echo "ATTEMPT 3: npm cache clean && npm install"
            npm cache clean --force
            npm install && echo "✅ INSTALL SUCCESS" || echo "❌ INSTALL FAILED"
          fi
          
          if [ $? -ne 0 ]; then
            echo "ATTEMPT 4: npm ci --force"
            npm ci --force && echo "✅ INSTALL SUCCESS" || echo "❌ INSTALL FAILED"
          fi
          
          echo "FINAL CHECK:"
          npm list --depth=0 || echo "⚠️ Some dependencies missing but continuing"

      # ============================================================
      # STEP 5: CREATE/FIX APP.JSON
      # ============================================================
      - name: Create/fix app.json
        run: |
          echo "=== CHECKING app.json ==="
          if [ ! -f "app.json" ]; then
            echo "Creating app.json..."
            cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          else
            echo "app.json exists, fixing..."
            cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          fi
          
          echo "✅ app.json ready:"
          cat app.json

      # ============================================================
      # STEP 6: GENERATE IOS FOLDER (TRY 4 METHODS)
      # ============================================================
      - name: Generate iOS folder (MULTIPLE METHODS)
        run: |
          export CI=1
          export EXPO_NO_INTERACTIVE=1
          
          rm -rf ios
          rm -rf node_modules/.cache
          
          echo "=== METHOD 1: expo prebuild with YES ==="
          echo "y" | npx expo prebuild --platform ios --clean && echo "✅ METHOD 1 SUCCESS" || echo "❌ METHOD 1 FAILED"
          
          if [ ! -d "ios" ]; then
            echo "=== METHOD 2: expo prebuild with CI=1 ==="
            CI=1 npx expo prebuild --platform ios --clean && echo "✅ METHOD 2 SUCCESS" || echo "❌ METHOD 2 FAILED"
          fi
          
          if [ ! -d "ios" ]; then
            echo "=== METHOD 3: react-native init ==="
            npx react-native init temp_ios --version 0.74.0 --skip-install
            cp -R temp_ios/ios .
            cp -R temp_ios/ios/* ios/ 2>/dev/null || true
            rm -rf temp_ios
            echo "✅ METHOD 3 ATTEMPTED"
          fi
          
          if [ ! -d "ios" ]; then
            echo "=== METHOD 4: Manual iOS folder creation ==="
            mkdir -p ios
            echo "platform :ios, '13.0'" > ios/Podfile
            echo "require_relative '../node_modules/@react-native-community/cli-platform-ios/native_modules'" >> ios/Podfile
            echo "target 'gymapp2' do" >> ios/Podfile
            echo "  config = use_native_modules!" >> ios/Podfile
            echo "  use_react_native!(:path => config['reactNativePath'])" >> ios/Podfile
            echo "end" >> ios/Podfile
            echo "✅ METHOD 4 ATTEMPTED"
          fi
          
          echo "=== IOS FOLDER STATUS ==="
          if [ -d "ios" ]; then
            echo "✅ iOS folder exists!"
            ls -la ios/
          else
            echo "❌ iOS folder missing!"
            exit 1
          fi

      # ============================================================
      # STEP 7: FIX PODFILE AND DISABLE NEW ARCH
      # ============================================================
      - name: Fix Podfile and disable new architecture
        run: |
          cd ios || exit 1
          
          # Remove any existing Podfile and create a fixed one
          rm -f Podfile
          
          cat > Podfile << 'EOF'
          require File.join(File.dirname(`node --print "require.resolve('expo/package.json')"`), "scripts/autolinking")
          require File.join(File.dirname(`node --print "require.resolve('react-native/package.json')"`), "scripts/react_native_pods")
          require File.join(File.dirname(`node --print "require.resolve('@react-native-community/cli-platform-ios/package.json')"`), "native_modules")
          
          platform :ios, '13.0'
          install! 'cocoapods', :deterministic_uuids => false
          
          target 'gymapp2' do
            use_expo_modules!
            config = use_native_modules!
            
            # DISABLE NEW ARCHITECTURE - This fixes the Codegen errors
            $RCT_NEW_ARCH_ENABLED = 0
            
            use_react_native!(
              :path => config[:reactNativePath],
              :hermes_enabled => true,
              :fabric_enabled => false,
              :flipper_configuration => FlipperConfiguration.enabled(false)
            )
            
            post_install do |installer|
              react_native_post_install(installer)
              
              # Fix for missing Codegen files
              installer.pods_project.targets.each do |target|
                if target.name == 'ReactCodegen'
                  target.build_configurations.each do |config|
                    config.build_settings['HEADER_SEARCH_PATHS'] = ['$(inherited)', '$(PODS_ROOT)/Headers/Public', '$(PODS_ROOT)/Headers/Private']
                  end
                end
              end
            end
          end
          EOF
          
          echo "Podfile created with NEW ARCH DISABLED"
          cat Podfile
          
          cd ..

      # ============================================================
      # STEP 8: INSTALL PODS (TRY 4 METHODS)
      # ============================================================
      - name: Install Pods (MULTIPLE ATTEMPTS)
        run: |
          sudo gem install cocoapods
          cd ios || exit 1
          
          echo "=== POD INSTALL ATTEMPT 1: pod install ==="
          pod install && echo "✅ PODS SUCCESS" || echo "❌ PODS FAILED"
          
          if [ $? -ne 0 ]; then
            echo "=== POD INSTALL ATTEMPT 2: pod install --repo-update ==="
            pod install --repo-update && echo "✅ PODS SUCCESS" || echo "❌ PODS FAILED"
          fi
          
          if [ $? -ne 0 ]; then
            echo "=== POD INSTALL ATTEMPT 3: pod install --verbose ==="
            pod install --verbose && echo "✅ PODS SUCCESS" || echo "❌ PODS FAILED"
          fi
          
          if [ $? -ne 0 ]; then
            echo "=== POD INSTALL ATTEMPT 4: pod cache clean --all && pod install ==="
            pod cache clean --all
            pod install && echo "✅ PODS SUCCESS" || echo "❌ PODS FAILED"
          fi
          
          echo "=== PODS STATUS ==="
          if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
            echo "✅ Pods installed successfully!"
          else
            echo "❌ Pods may not be installed correctly"
          fi
          
          cd ..

      # ============================================================
      # STEP 9: FIND WORKSPACE OR PROJECT
      # ============================================================
      - name: Find workspace/project
        id: find_workspace
        run: |
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "FOUND_WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=workspace" >> $GITHUB_ENV
            echo "✅ Found workspace: $WORKSPACE with scheme: $SCHEME"
          elif [ -n "$PROJECT" ]; then
            SCHEME=$(basename "$PROJECT" .xcodeproj)
            echo "FOUND_PROJECT=$PROJECT" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=project" >> $GITHUB_ENV
            echo "✅ Found project: $PROJECT with scheme: $SCHEME"
          else
            echo "❌ No iOS project found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================================
      # STEP 10: BUILD APP WITH NEW ARCH DISABLED
      # ============================================================
      - name: Build iOS app (MULTIPLE ATTEMPTS)
        run: |
          cd ios || exit 1
          
          rm -rf build
          
          # Disable new architecture for build
          export RCT_NEW_ARCH_ENABLED=0
          
          if [ "$BUILD_TYPE" = "workspace" ]; then
            echo "=== BUILD ATTEMPT 1: xcodebuild with workspace ==="
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
          else
            echo "=== BUILD ATTEMPT 1: xcodebuild with project ==="
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
          fi
          
          if [ $? -ne 0 ]; then
            echo "=== BUILD ATTEMPT 2: xcodebuild with clean ==="
            xcodebuild clean -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" || xcodebuild clean -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME"
            if [ "$BUILD_TYPE" = "workspace" ]; then
              xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
            else
              xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
            fi
          fi
          
          if [ $? -ne 0 ]; then
            echo "=== BUILD ATTEMPT 3: xcodebuild with additional flags ==="
            if [ "$BUILD_TYPE" = "workspace" ]; then
              xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO OTHER_SWIFT_FLAGS="-DDEBUG" ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
            else
              xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO OTHER_SWIFT_FLAGS="-DDEBUG" ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0 && echo "✅ BUILD SUCCESS" || echo "❌ BUILD FAILED"
            fi
          fi
          
          cd ..

      # ============================================================
      # STEP 11: FIND .APP (SEARCH EVERYWHERE)
      # ============================================================
      - name: Find .app file
        id: find_app
        run: |
          echo "=== SEARCHING FOR .APP FILE ==="
          
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -maxdepth 3 -name "*.app" -type d | grep -v "Pods" | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found anywhere!"
            echo "=== SEARCH RESULTS ==="
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ============================================================
      # STEP 12: CREATE UNSIGNED IPA
      # ============================================================
      - name: Create unsigned IPA
        run: |
          echo "=== PACKAGING IPA ==="
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r gymapp2-unsigned.ipa Payload/
          
          # Check IPA size
          IPA_SIZE=$(stat -f%z "gymapp2-unsigned.ipa" 2>/dev/null || stat -c%s "gymapp2-unsigned.ipa" 2>/dev/null)
          echo "Unsigned IPA size: $IPA_SIZE bytes"
          
          if [ "$IPA_SIZE" -lt 1000000 ]; then
            echo "❌ IPA is too small ($IPA_SIZE bytes)! Build failed."
            echo "=== PAYLOAD CONTENTS ==="
            ls -la Payload/
            exit 1
          fi
          
          echo "✅ Unsigned IPA created successfully!"

      # ============================================================
      # STEP 13: DOWNLOAD ZSIGN
      # ============================================================
      - name: Download zsign
        run: |
          echo "=== DOWNLOADING ZSIGN ==="
          curl -L -o zsign https://github.com/zhlynn/zsign/releases/latest/download/zsign-macos
          chmod +x zsign
          
          if [ -f "zsign" ]; then
            echo "✅ zsign downloaded successfully!"
            ls -la zsign
          else
            echo "❌ zsign download failed!"
            exit 1
          fi

      # ============================================================
      # STEP 14: FIND CERTIFICATE AND PROFILE
      # ============================================================
      - name: Find certificate and profile
        id: find_cert
        run: |
          echo "=== FINDING CERTIFICATE ==="
          
          # Look for certificate
          CERT_FILE=$(ls *.p12 2>/dev/null | head -1)
          if [ -z "$CERT_FILE" ]; then
            echo "❌ No .p12 certificate found!"
            echo "Available files:"
            ls -la
            exit 1
          fi
          echo "✅ Found certificate: $CERT_FILE"
          echo "CERT_FILE=$CERT_FILE" >> $GITHUB_ENV
          
          echo "=== FINDING PROVISIONING PROFILE ==="
          PROFILE_FILE=$(ls *.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "❌ No .mobileprovision file found!"
            echo "Available files:"
            ls -la
            exit 1
          fi
          echo "✅ Found profile: $PROFILE_FILE"
          echo "PROFILE_FILE=$PROFILE_FILE" >> $GITHUB_ENV

      # ============================================================
      # STEP 15: SIGN THE IPA (TRY 3 METHODS)
      # ============================================================
      - name: Sign IPA (MULTIPLE ATTEMPTS)
        run: |
          echo "=========================================="
          echo "SIGNING IPA"
          echo "=========================================="
          echo "Certificate: ${{ env.CERT_FILE }}"
          echo "Profile: ${{ env.PROFILE_FILE }}"
          echo "=========================================="
          
          # Try with password from secrets or hardcoded
          PASSWORD="${{ secrets.CERT_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
            PASSWORD="Uhjiply-7643"
          fi
          
          # Method 1: Standard signing
          echo "=== METHOD 1: Standard signing ==="
          ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa" && echo "✅ SIGNING SUCCESS" || echo "❌ SIGNING FAILED"
          
          # Method 2: With compression
          if [ ! -f "gymapp2-signed.ipa" ] || [ ! -s "gymapp2-signed.ipa" ]; then
            echo "=== METHOD 2: Signing with compression ==="
            ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -z 9 -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa" && echo "✅ SIGNING SUCCESS" || echo "❌ SIGNING FAILED"
          fi
          
          # Method 3: With verbose output
          if [ ! -f "gymapp2-signed.ipa" ] || [ ! -s "gymapp2-signed.ipa" ]; then
            echo "=== METHOD 3: Signing with verbose ==="
            ./zsign -v -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa" && echo "✅ SIGNING SUCCESS" || echo "❌ SIGNING FAILED"
          fi
          
          # Check if signed IPA was created
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            SIZE=$(stat -f%z "gymapp2-signed.ipa" 2>/dev/null || stat -c%s "gymapp2-signed.ipa" 2>/dev/null)
            echo "✅ Signed IPA created! Size: $SIZE bytes"
          else
            echo "❌ Signing failed completely!"
            exit 1
          fi

      # ============================================================
      # STEP 16: VERIFY SIGNED IPA
      # ============================================================
      - name: Verify signed IPA
        run: |
          echo "=== VERIFYING SIGNED IPA ==="
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            SIZE=$(stat -f%z "gymapp2-signed.ipa" 2>/dev/null || stat -c%s "gymapp2-signed.ipa" 2>/dev/null)
            echo "✅ Signed IPA is valid!"
            echo "Size: $SIZE bytes"
            
            # Check if it's a valid zip
            unzip -t gymapp2-signed.ipa 2>&1 | head -3
            echo "✅ Signed IPA is ready to install!"
          else
            echo "❌ Signed IPA is missing or empty!"
            exit 1
          fi

      # ============================================================
      # STEP 17: UPLOAD UNSIGNED IPA
      # ============================================================
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 18: UPLOAD SIGNED IPA
      # ============================================================
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-signed-ipa
          path: gymapp2-signed.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 19: UPLOAD BUILD LOGS
      # ============================================================
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build/**/*.log
            ios/Podfile.lock
            ios/Pods/
            package.json
            app.json
          retention-days: 7

      # ============================================================
      # STEP 20: SUCCESS MESSAGE
      # ============================================================
      - name: Build and sign complete!
        if: success()
        run: |
          echo "============================================================"
          echo "🎉🎉🎉 BUILD AND SIGN COMPLETE! 🎉🎉🎉"
          echo "============================================================"
          echo "📦 UNSIGNED IPA: gymapp2-unsigned-ipa (Backup)"
          echo "📦 SIGNED IPA: gymapp2-signed-ipa (READY TO INSTALL)"
          echo "============================================================"
          echo "NEXT STEPS:"
          echo "1. Download gymapp2-signed-ipa from Artifacts"
          echo "2. AirDrop to your iPhone"
          echo "3. Open with AltStore"
          echo "4. Tap Install"
          echo "5. Trust the certificate in Settings → General → VPN & Device Management"
          echo "6. Launch the app!"
          echo "============================================================"
          echo "SIGNED IPA SIZE:"
          ls -la gymapp2-signed.ipa
          echo "============================================================"

      # ============================================================
      # STEP 21: DEBUG ON FAILURE
      # ============================================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "============================================================"
          echo "❌❌❌ BUILD OR SIGN FAILED ❌❌❌"
          echo "============================================================"
          echo "=== ALL FILES ==="
          ls -la
          echo "=== IOS FOLDER ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "=== APP FILE ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== IPA FILES ==="
          find . -name "*.ipa" -type f 2>/dev/null
          echo "=== CERTIFICATE FILES ==="
          ls -la *.p12 2>/dev/null || echo "No .p12 files"
          echo "=== PROFILE FILES ==="
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files"
          echo "============================================================"
          echo "Download build-logs to see what went wrong"
          echo "============================================================"
