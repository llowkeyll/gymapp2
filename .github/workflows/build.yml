name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
      
      - name: Build React Native iOS App
        run: |
          npx react-native bundle --entry-file index.js --bundle-output ios/main.jsbundle --platform ios --dev false
          cd ios
          pod install
          xcodebuild -workspace YourProjectName.xcworkspace -scheme YourSchemeName -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/YourApp.app Payload/
          zip -r YourApp.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: YourApp
          path: YourApp.ipa
