name: INDESTRUCTIBLE IPA BUILDER - FULL CODE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================================
      # STEP 1: CHECKOUT CODE
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # ============================================================
      # STEP 2: LIST ALL FILES (DEBUG)
      # ============================================================
      - name: List all files
        run: |
          echo "=========================================="
          echo "ALL FILES IN REPOSITORY:"
          echo "=========================================="
          ls -la
          echo "=========================================="
          echo "FILE COUNT:"
          find . -type f | wc -l
          echo "=========================================="
          echo "CERTIFICATE FILES:"
          ls -la *.p12 2>/dev/null || echo "No .p12 files found"
          echo "=========================================="
          echo "PROFILE FILES:"
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files found"
          echo "=========================================="

      # ============================================================
      # STEP 3: SETUP NODE 20
      # ============================================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================================
      # STEP 4: INSTALL DEPENDENCIES (5 METHODS)
      # ============================================================
      - name: Install dependencies (5 METHODS)
        run: |
          echo "=========================================="
          echo "INSTALLING DEPENDENCIES - 5 METHODS"
          echo "=========================================="
          
          echo "=== METHOD 1: npm install --force ==="
          npm install --force
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 1 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 1 FAILED"
          fi
          
          echo "=== METHOD 2: npm install --legacy-peer-deps ==="
          npm install --legacy-peer-deps
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 2 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 2 FAILED"
          fi
          
          echo "=== METHOD 3: npm cache clean && npm install ==="
          npm cache clean --force
          npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 3 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 3 FAILED"
          fi
          
          echo "=== METHOD 4: npm install (clean slate) ==="
          rm -rf node_modules
          npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 4 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 4 FAILED"
          fi
          
          echo "=== METHOD 5: npm install with CI=1 ==="
          CI=1 npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 5 SUCCESS"
            exit 0
          else
            echo "❌ ALL INSTALL METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 5: VERIFY NODE_MODULES
      # ============================================================
      - name: Verify node_modules
        run: |
          echo "=========================================="
          echo "VERIFYING NODE_MODULES"
          echo "=========================================="
          if [ -d "node_modules" ]; then
            echo "✅ node_modules exists"
            echo "Size: $(du -sh node_modules | cut -f1)"
            echo "Number of packages: $(ls node_modules | wc -l)"
          else
            echo "❌ node_modules missing!"
            exit 1
          fi

      # ============================================================
      # STEP 6: CREATE APP.JSON (FORCE)
      # ============================================================
      - name: Create app.json (FORCE)
        run: |
          echo "=========================================="
          echo "CREATING APP.JSON"
          echo "=========================================="
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          echo "✅ app.json created"
          cat app.json

      # ============================================================
      # STEP 7: GENERATE IOS FOLDER (8 METHODS - QUADRUPLE CHECK)
      # ============================================================
      - name: Generate iOS folder (8 METHODS)
        id: generate_ios
        run: |
          echo "=========================================="
          echo "GENERATING IOS FOLDER - 8 METHODS"
          echo "=========================================="
          
          rm -rf ios
          rm -rf node_modules/.cache
          
          # ==========================================================
          # METHOD 1: Expo prebuild with YES pipe + CI
          # ==========================================================
          echo "=== METHOD 1: expo prebuild with YES pipe ==="
          CI=1 echo "y" | npx expo prebuild --platform ios --clean 2>&1 | tee prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 1 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 1 FAILED"
          fi
          
          # ==========================================================
          # METHOD 2: Expo prebuild with yes command
          # ==========================================================
          echo "=== METHOD 2: expo prebuild with yes command ==="
          yes | npx expo prebuild --platform ios --clean 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 2 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 2 FAILED"
          fi
          
          # ==========================================================
          # METHOD 3: Expo prebuild with --yes flag
          # ==========================================================
          echo "=== METHOD 3: expo prebuild with --yes ==="
          CI=1 npx expo prebuild --platform ios --clean --yes 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 3 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 3 FAILED"
          fi
          
          # ==========================================================
          # METHOD 4: Expo prebuild with -y flag
          # ==========================================================
          echo "=== METHOD 4: expo prebuild with -y ==="
          CI=1 npx expo prebuild --platform ios --clean -y 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 4 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 4 FAILED"
          fi
          
          # ==========================================================
          # METHOD 5: Expo prebuild with YES YES YES
          # ==========================================================
          echo "=== METHOD 5: expo prebuild with YES YES YES ==="
          printf "y\ny\ny\ny\ny\n" | npx expo prebuild --platform ios --clean 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 5 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 5 FAILED"
          fi
          
          # ==========================================================
          # METHOD 6: Expo prebuild with expect script
          # ==========================================================
          echo "=== METHOD 6: expo prebuild with expect ==="
          expect -c '
          spawn npx expo prebuild --platform ios --clean
          expect "Install the updated dependencies?"
          send "y\r"
          expect eof
          ' 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 6 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 6 FAILED"
          fi
          
          # ==========================================================
          # METHOD 7: React Native init (BYPASS EXPO)
          # ==========================================================
          echo "=== METHOD 7: react-native init (BYPASS) ==="
          npx react-native init temp_ios --version 0.74.0 --skip-install
          if [ -d "temp_ios/ios" ]; then
            cp -R temp_ios/ios .
            cp -R temp_ios/ios/* ios/ 2>/dev/null || true
            rm -rf temp_ios
            echo "✅ METHOD 7 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 7 FAILED"
          fi
          
          # ==========================================================
          # METHOD 8: Manual iOS folder creation
          # ==========================================================
          echo "=== METHOD 8: Manual iOS folder creation ==="
          mkdir -p ios
          cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'
          require_relative '../node_modules/@react-native-community/cli-platform-ios/native_modules'
          target 'gymapp2' do
            config = use_native_modules!
            use_react_native!(:path => config["reactNativePath"])
            post_install do |installer|
              react_native_post_install(installer)
            end
          end
          EOF
          
          mkdir -p ios/gymapp2
          cat > ios/gymapp2/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>gymapp2</string>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>$(PRODUCT_NAME)</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <true/>
            </dict>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          EOF
          
          if [ -d "ios" ]; then
            echo "✅ METHOD 8 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ ALL 8 METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 8: FIX PODFILE (DOUBLE CHECK)
      # ============================================================
      - name: Fix Podfile
        run: |
          echo "=========================================="
          echo "FIXING PODFILE"
          echo "=========================================="
          cd ios || exit 1
          
          cat > Podfile << 'EOF'
          require File.join(File.dirname(`node --print "require.resolve('expo/package.json')"`), "scripts/autolinking")
          require File.join(File.dirname(`node --print "require.resolve('react-native/package.json')"`), "scripts/react_native_pods")
          require File.join(File.dirname(`node --print "require.resolve('@react-native-community/cli-platform-ios/package.json')"`), "native_modules")
          
          platform :ios, '13.0'
          install! 'cocoapods', :deterministic_uuids => false
          
          # DISABLE NEW ARCHITECTURE
          $RCT_NEW_ARCH_ENABLED = 0
          
          target 'gymapp2' do
            use_expo_modules!
            config = use_native_modules!
            
            use_react_native!(
              :path => config[:reactNativePath],
              :hermes_enabled => true,
              :fabric_enabled => false,
              :flipper_configuration => FlipperConfiguration.enabled(false)
            )
            
            post_install do |installer|
              react_native_post_install(installer)
              
              installer.pods_project.targets.each do |target|
                if target.name == 'ReactCodegen'
                  target.build_configurations.each do |config|
                    config.build_settings['HEADER_SEARCH_PATHS'] = ['$(inherited)', '$(PODS_ROOT)/Headers/Public', '$(PODS_ROOT)/Headers/Private']
                  end
                end
              end
            end
          end
          EOF
          
          echo "✅ Podfile created"
          cat Podfile
          cd ..

      # ============================================================
      # STEP 9: INSTALL PODS (4 METHODS)
      # ============================================================
      - name: Install Pods (4 METHODS)
        run: |
          echo "=========================================="
          echo "INSTALLING PODS - 4 METHODS"
          echo "=========================================="
          
          sudo gem install cocoapods
          cd ios || exit 1
          
          echo "=== PODS METHOD 1: pod install ==="
          pod install
          if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
            echo "✅ METHOD 1 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 1 FAILED"
          fi
          
          echo "=== PODS METHOD 2: pod install --repo-update ==="
          pod install --repo-update
          if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
            echo "✅ METHOD 2 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 2 FAILED"
          fi
          
          echo "=== PODS METHOD 3: pod install --verbose ==="
          pod install --verbose
          if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
            echo "✅ METHOD 3 SUCCESS"
            exit 0
          else
            echo "❌ METHOD 3 FAILED"
          fi
          
          echo "=== PODS METHOD 4: pod cache clean && pod install ==="
          pod cache clean --all
          pod install
          if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
            echo "✅ METHOD 4 SUCCESS"
            exit 0
          else
            echo "❌ ALL POD METHODS FAILED!"
            exit 1
          fi
          
          cd ..

      # ============================================================
      # STEP 10: FIND WORKSPACE (DOUBLE CHECK)
      # ============================================================
      - name: Find workspace
        id: find_workspace
        run: |
          echo "=========================================="
          echo "FINDING WORKSPACE"
          echo "=========================================="
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "FOUND_WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=workspace" >> $GITHUB_ENV
            echo "✅ Found workspace: $WORKSPACE"
            echo "✅ Scheme: $SCHEME"
          elif [ -n "$PROJECT" ]; then
            SCHEME=$(basename "$PROJECT" .xcodeproj)
            echo "FOUND_PROJECT=$PROJECT" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=project" >> $GITHUB_ENV
            echo "✅ Found project: $PROJECT"
            echo "✅ Scheme: $SCHEME"
          else
            echo "❌ No iOS project found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================================
      # STEP 11: BUILD APP (3 METHODS)
      # ============================================================
      - name: Build iOS app (3 METHODS)
        run: |
          echo "=========================================="
          echo "BUILDING IOS APP - 3 METHODS"
          echo "=========================================="
          
          cd ios || exit 1
          
          rm -rf build
          export RCT_NEW_ARCH_ENABLED=0
          
          echo "=== BUILD METHOD 1: Standard ==="
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 1 SUCCESS"
            exit 0
          else
            echo "❌ BUILD METHOD 1 FAILED"
          fi
          
          echo "=== BUILD METHOD 2: Clean ==="
          xcodebuild clean
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 2 SUCCESS"
            exit 0
          else
            echo "❌ BUILD METHOD 2 FAILED"
          fi
          
          echo "=== BUILD METHOD 3: Additional flags ==="
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 3 SUCCESS"
            exit 0
          else
            echo "❌ ALL BUILD METHODS FAILED!"
            exit 1
          fi
          
          cd ..

      # ============================================================
      # STEP 12: FIND APP (4 LOCATIONS)
      # ============================================================
      - name: Find app
        id: find_app
        run: |
          echo "=========================================="
          echo "FINDING APP - 4 LOCATIONS"
          echo "=========================================="
          
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          [ -n "$APP_PATH" ] && echo "Found in ios/build: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -maxdepth 3 -name "*.app" -type d | grep -v "Pods" | head -1)
            [ -n "$APP_PATH" ] && echo "Found in root: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
            [ -n "$APP_PATH" ] && echo "Found in DerivedData: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -1)
            [ -n "$APP_PATH" ] && echo "Found anywhere: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ No app found anywhere!"
            echo "=== SEARCH RESULTS ==="
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "✅ Found app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ============================================================
      # STEP 13: VERIFY APP
      # ============================================================
      - name: Verify app
        run: |
          echo "=========================================="
          echo "VERIFYING APP"
          echo "=========================================="
          
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          
          if [ -f "$APP_PATH/Info.plist" ]; then
            echo "✅ Info.plist found"
          else
            echo "❌ Info.plist missing!"
            exit 1
          fi
          
          echo "✅ App verified"

      # ============================================================
      # STEP 14: CREATE UNSIGNED IPA
      # ============================================================
      - name: Create unsigned IPA
        run: |
          echo "=========================================="
          echo "CREATING UNSIGNED IPA"
          echo "=========================================="
          
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          echo "=== PAYLOAD CONTENTS ==="
          ls -la Payload/
          du -sh Payload/
          
          zip -r gymapp2-unsigned.ipa Payload/
          
          IPA_SIZE=$(stat -f%z "gymapp2-unsigned.ipa" 2>/dev/null || stat -c%s "gymapp2-unsigned.ipa" 2>/dev/null)
          echo "Unsigned IPA size: $IPA_SIZE bytes"
          
          if [ "$IPA_SIZE" -lt 1000000 ]; then
            echo "❌ IPA is too small ($IPA_SIZE bytes)! Build failed."
            echo "=== PAYLOAD CONTENTS ==="
            ls -la Payload/
            exit 1
          fi
          
          echo "✅ Unsigned IPA created successfully!"

      # ============================================================
      # STEP 15: DOWNLOAD ZSIGN
      # ============================================================
      - name: Download zsign
        run: |
          echo "=========================================="
          echo "DOWNLOADING ZSIGN"
          echo "=========================================="
          
          curl -L -o zsign https://github.com/zhlynn/zsign/releases/latest/download/zsign-macos
          chmod +x zsign
          
          if [ -f "zsign" ]; then
            echo "✅ zsign downloaded successfully!"
            ls -la zsign
          else
            echo "❌ zsign download failed!"
            exit 1
          fi

      # ============================================================
      # STEP 16: FIND CERTIFICATE AND PROFILE
      # ============================================================
      - name: Find certificate and profile
        id: find_cert
        run: |
          echo "=========================================="
          echo "FINDING CERTIFICATE AND PROFILE"
          echo "=========================================="
          
          CERT_FILE=$(ls *.p12 2>/dev/null | head -1)
          if [ -z "$CERT_FILE" ]; then
            echo "❌ No .p12 certificate found!"
            echo "Available files:"
            ls -la
            exit 1
          fi
          echo "✅ Found certificate: $CERT_FILE"
          echo "CERT_FILE=$CERT_FILE" >> $GITHUB_ENV
          
          PROFILE_FILE=$(ls *.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "❌ No .mobileprovision file found!"
            echo "Available files:"
            ls -la
            exit 1
          fi
          echo "✅ Found profile: $PROFILE_FILE"
          echo "PROFILE_FILE=$PROFILE_FILE" >> $GITHUB_ENV

      # ============================================================
      # STEP 17: SIGN THE IPA (3 METHODS)
      # ============================================================
      - name: Sign IPA (3 METHODS)
        run: |
          echo "=========================================="
          echo "SIGNING IPA - 3 METHODS"
          echo "=========================================="
          echo "Certificate: ${{ env.CERT_FILE }}"
          echo "Profile: ${{ env.PROFILE_FILE }}"
          echo "=========================================="
          
          PASSWORD="Uhjiply-7643"
          
          echo "=== SIGN METHOD 1: Standard signing ==="
          ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 1 SUCCESS"
            exit 0
          else
            echo "❌ SIGN METHOD 1 FAILED"
          fi
          
          echo "=== SIGN METHOD 2: Signing with compression ==="
          ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -z 9 -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 2 SUCCESS"
            exit 0
          else
            echo "❌ SIGN METHOD 2 FAILED"
          fi
          
          echo "=== SIGN METHOD 3: Signing with verbose ==="
          ./zsign -v -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 3 SUCCESS"
            exit 0
          else
            echo "❌ ALL SIGN METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 18: VERIFY SIGNED IPA
      # ============================================================
      - name: Verify signed IPA
        run: |
          echo "=========================================="
          echo "VERIFYING SIGNED IPA"
          echo "=========================================="
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            SIZE=$(stat -f%z "gymapp2-signed.ipa" 2>/dev/null || stat -c%s "gymapp2-signed.ipa" 2>/dev/null)
            echo "✅ Signed IPA is valid!"
            echo "Size: $SIZE bytes"
            echo "✅ Signed IPA is ready to install!"
          else
            echo "❌ Signed IPA is missing or empty!"
            exit 1
          fi

      # ============================================================
      # STEP 19: UPLOAD UNSIGNED IPA
      # ============================================================
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 20: UPLOAD SIGNED IPA
      # ============================================================
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-signed-ipa
          path: gymapp2-signed.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 21: UPLOAD BUILD LOGS
      # ============================================================
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build/**/*.log
            ios/Podfile.lock
            ios/Pods/
            package.json
            app.json
            prebuild_log.txt
          retention-days: 7

      # ============================================================
      # STEP 22: SUCCESS MESSAGE
      # ============================================================
      - name: Build and sign complete!
        if: success()
        run: |
          echo "============================================================"
          echo "🎉🎉🎉 BUILD AND SIGN COMPLETE! 🎉🎉🎉"
          echo "============================================================"
          echo "📦 UNSIGNED IPA: gymapp2-unsigned-ipa (Backup)"
          echo "📦 SIGNED IPA: gymapp2-signed-ipa (READY TO INSTALL)"
          echo "============================================================"
          echo "NEXT STEPS:"
          echo "1. Download gymapp2-signed-ipa from Artifacts"
          echo "2. AirDrop to your iPhone"
          echo "3. Open with AltStore"
          echo "4. Tap Install"
          echo "5. Trust the certificate in Settings → General → VPN & Device Management"
          echo "6. Launch the app!"
          echo "============================================================"
          echo "SIGNED IPA SIZE:"
          ls -la gymapp2-signed.ipa
          echo "============================================================"

      # ============================================================
      # STEP 23: DEBUG ON FAILURE
      # ============================================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "============================================================"
          echo "❌❌❌ BUILD OR SIGN FAILED ❌❌❌"
          echo "============================================================"
          echo "=== ALL FILES ==="
          ls -la
          echo "=== IOS FOLDER ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "=== APP FILE ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== IPA FILES ==="
          find . -name "*.ipa" -type f 2>/dev/null
          echo "=== CERTIFICATE FILES ==="
          ls -la *.p12 2>/dev/null || echo "No .p12 files"
          echo "=== PROFILE FILES ==="
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files"
          echo "=== PREBUILD LOG ==="
          cat prebuild_log.txt 2>/dev/null || echo "No prebuild log"
          echo "============================================================"
          echo "Download build-logs to see what went wrong"
          echo "============================================================"
