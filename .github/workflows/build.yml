name: Build iOS IPA (EAS Local)

on:
  workflow_dispatch:

env:
  CI: 1 # This forces EAS to never stop and ask questions

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: npm install

      - name: Build Unsigned IPA via EAS
        # --local forces EAS to build directly on this free GitHub Mac.
        # It automatically bypasses Expo servers and Apple Developer requirements!
        run: eas build --platform ios --local --profile preview

      - name: Upload IPA File
        uses: actions/upload-artifact@v4
        with:
          name: WeightTracker-IPA
          path: "*.ipa" # Grabs the IPA file EAS generates
