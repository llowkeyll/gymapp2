name: ULTIMATE FOOLPROOF IPA BUILDER - FULL SYSTEM CHECK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # ============================================================
      # STEP 1: CHECKOUT CODE
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # ============================================================
      # STEP 2: LIST ALL FILES (DEBUG)
      # ============================================================
      - name: List all files
        run: |
          echo "============================================================"
          echo "ALL FILES IN REPOSITORY:"
          echo "============================================================"
          ls -la
          echo "============================================================"
          echo "FILE COUNT:"
          find . -type f | wc -l
          echo "============================================================"
          echo "CERTIFICATE FILES:"
          ls -la *.p12 2>/dev/null || echo "No .p12 files found"
          echo "============================================================"
          echo "PROFILE FILES:"
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files found"
          echo "============================================================"
          echo "CHECKING FOR EXISTING IOS FOLDER:"
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "============================================================"

      # ============================================================
      # STEP 3: SETUP NODE 20
      # ============================================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================================
      # STEP 4: INSTALL DEPENDENCIES (SYSTEM CHECK 1)
      # ============================================================
      - name: Install dependencies - METHOD 1 (npm install --force)
        id: install_1
        run: |
          echo "============================================================"
          echo "INSTALL DEPENDENCIES - METHOD 1: npm install --force"
          echo "============================================================"
          npm install --force
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 1 SUCCESS"
            echo "INSTALL_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 1 FAILED"
            echo "INSTALL_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies - METHOD 2 (npm install --legacy-peer-deps)
        if: env.INSTALL_SUCCESS == 'false'
        id: install_2
        run: |
          echo "============================================================"
          echo "INSTALL DEPENDENCIES - METHOD 2: npm install --legacy-peer-deps"
          echo "============================================================"
          npm install --legacy-peer-deps
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 2 SUCCESS"
            echo "INSTALL_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 2 FAILED"
            echo "INSTALL_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies - METHOD 3 (npm cache clean && npm install)
        if: env.INSTALL_SUCCESS == 'false'
        id: install_3
        run: |
          echo "============================================================"
          echo "INSTALL DEPENDENCIES - METHOD 3: npm cache clean && npm install"
          echo "============================================================"
          npm cache clean --force
          npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 3 SUCCESS"
            echo "INSTALL_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 3 FAILED"
            echo "INSTALL_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies - METHOD 4 (rm -rf node_modules && npm install)
        if: env.INSTALL_SUCCESS == 'false'
        id: install_4
        run: |
          echo "============================================================"
          echo "INSTALL DEPENDENCIES - METHOD 4: rm -rf node_modules && npm install"
          echo "============================================================"
          rm -rf node_modules
          npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 4 SUCCESS"
            echo "INSTALL_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 4 FAILED"
            echo "INSTALL_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies - METHOD 5 (CI=1 npm install)
        if: env.INSTALL_SUCCESS == 'false'
        id: install_5
        run: |
          echo "============================================================"
          echo "INSTALL DEPENDENCIES - METHOD 5: CI=1 npm install"
          echo "============================================================"
          CI=1 npm install
          if [ $? -eq 0 ]; then
            echo "✅ METHOD 5 SUCCESS"
            echo "INSTALL_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ ALL INSTALL METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 5: VERIFY NODE_MODULES
      # ============================================================
      - name: Verify node_modules
        run: |
          echo "============================================================"
          echo "VERIFYING NODE_MODULES"
          echo "============================================================"
          if [ -d "node_modules" ]; then
            echo "✅ node_modules exists"
            echo "Size: $(du -sh node_modules | cut -f1)"
            echo "Number of packages: $(ls node_modules | wc -l)"
            echo "React Native version: $(node -e "console.log(require('./node_modules/react-native/package.json').version)" 2>/dev/null || echo 'Not found')"
            echo "Expo version: $(node -e "console.log(require('./node_modules/expo/package.json').version)" 2>/dev/null || echo 'Not found')"
          else
            echo "❌ node_modules missing!"
            exit 1
          fi

      # ============================================================
      # STEP 6: CREATE APP.JSON (FORCE)
      # ============================================================
      - name: Create app.json (FORCE)
        run: |
          echo "============================================================"
          echo "CREATING APP.JSON"
          echo "============================================================"
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "gymapp2",
              "slug": "gymapp2",
              "version": "1.0.0",
              "platforms": ["ios", "web"],
              "ios": {
                "bundleIdentifier": "com.yourcompany.gymapp2",
                "supportsTablet": true
              }
            }
          }
          EOF
          echo "✅ app.json created"
          cat app.json

      # ============================================================
      # STEP 7: GENERATE IOS FOLDER (SYSTEM CHECK 2 - 5 METHODS)
      # ============================================================
      - name: Generate iOS folder - METHOD 1 (expo prebuild with YES)
        id: ios_1
        run: |
          echo "============================================================"
          echo "GENERATE IOS FOLDER - METHOD 1: expo prebuild with YES"
          echo "============================================================"
          rm -rf ios
          rm -rf node_modules/.cache
          export CI=1
          export EXPO_NO_INTERACTIVE=1
          echo "y" | npx expo prebuild --platform ios --clean 2>&1 | tee prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 1 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 1 FAILED"
            echo "IOS_GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Generate iOS folder - METHOD 2 (expo prebuild with CI=1)
        if: env.IOS_GENERATED == 'false'
        id: ios_2
        run: |
          echo "============================================================"
          echo "GENERATE IOS FOLDER - METHOD 2: expo prebuild with CI=1"
          echo "============================================================"
          rm -rf ios
          CI=1 npx expo prebuild --platform ios --clean 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 2 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 2 FAILED"
            echo "IOS_GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Generate iOS folder - METHOD 3 (react-native init)
        if: env.IOS_GENERATED == 'false'
        id: ios_3
        run: |
          echo "============================================================"
          echo "GENERATE IOS FOLDER - METHOD 3: react-native init"
          echo "============================================================"
          rm -rf ios
          npx react-native init temp_ios --version 0.74.0 --skip-install
          if [ -d "temp_ios/ios" ]; then
            cp -R temp_ios/ios .
            cp -R temp_ios/ios/* ios/ 2>/dev/null || true
            rm -rf temp_ios
            echo "✅ METHOD 3 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 3 FAILED"
            echo "IOS_GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Generate iOS folder - METHOD 4 (Manual creation)
        if: env.IOS_GENERATED == 'false'
        id: ios_4
        run: |
          echo "============================================================"
          echo "GENERATE IOS FOLDER - METHOD 4: Manual creation"
          echo "============================================================"
          mkdir -p ios
          mkdir -p ios/gymapp2
          mkdir -p ios/gymapp2/Images.xcassets/AppIcon.appiconset
          mkdir -p ios/gymapp2/Base.lproj
          
          cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'
          target 'gymapp2' do
            pod 'React'
            pod 'React-Core'
            pod 'React-RCTActionSheet'
            pod 'React-RCTAnimation'
            pod 'React-RCTBlob'
            pod 'React-RCTImage'
            pod 'React-RCTLinking'
            pod 'React-RCTNetwork'
            pod 'React-RCTSettings'
            pod 'React-RCTText'
            pod 'React-RCTVibration'
            pod 'React-RCTWebSocket'
            pod 'React-cxxreact'
            pod 'React-jsi'
            pod 'React-jsiexecutor'
            pod 'React-jsinspector'
            pod 'ReactCommon'
            pod 'Yoga'
            pod 'FBLazyVector'
            pod 'RCTRequired'
            pod 'RCTTypeSafety'
            pod 'ExpoModulesCore'
          end
          EOF
          
          if [ -d "ios" ]; then
            echo "✅ METHOD 4 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ METHOD 4 FAILED"
            echo "IOS_GENERATED=false" >> $GITHUB_ENV
          fi

      - name: Generate iOS folder - METHOD 5 (Expo run:ios)
        if: env.IOS_GENERATED == 'false'
        id: ios_5
        run: |
          echo "============================================================"
          echo "GENERATE IOS FOLDER - METHOD 5: Expo run:ios"
          echo "============================================================"
          rm -rf ios
          npx expo run:ios --no-build-cache --no-install --no-dev 2>&1 | tee -a prebuild_log.txt
          if [ -d "ios" ]; then
            echo "✅ METHOD 5 SUCCESS"
            echo "IOS_GENERATED=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ ALL METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 8: PODFILE STRATEGY 1 - REACT NATIVE ONLY (SIMPLEST)
      # ============================================================
      - name: Podfile Strategy 1 - React Native Only
        id: podfile_1
        run: |
          echo "============================================================"
          echo "PODFILE STRATEGY 1: React Native Only (Simplest)"
          echo "============================================================"
          cd ios || exit 1
          
          cat > Podfile << 'EOF'
          platform :ios, '13.0'
          
          $RCT_NEW_ARCH_ENABLED = 0
          
          target 'gymapp2' do
            pod 'React', :path => '../node_modules/react-native'
            pod 'React-Core', :path => '../node_modules/react-native/React'
            pod 'React-RCTActionSheet', :path => '../node_modules/react-native/Libraries/ActionSheetIOS'
            pod 'React-RCTAnimation', :path => '../node_modules/react-native/Libraries/NativeAnimation'
            pod 'React-RCTBlob', :path => '../node_modules/react-native/Libraries/Blob'
            pod 'React-RCTImage', :path => '../node_modules/react-native/Libraries/Image'
            pod 'React-RCTLinking', :path => '../node_modules/react-native/Libraries/LinkingIOS'
            pod 'React-RCTNetwork', :path => '../node_modules/react-native/Libraries/Network'
            pod 'React-RCTSettings', :path => '../node_modules/react-native/Libraries/Settings'
            pod 'React-RCTText', :path => '../node_modules/react-native/Libraries/Text'
            pod 'React-RCTVibration', :path => '../node_modules/react-native/Libraries/Vibration'
            pod 'React-RCTWebSocket', :path => '../node_modules/react-native/Libraries/WebSocket'
            pod 'React-callinvoker', :path => '../node_modules/react-native/ReactCommon/callinvoker'
            pod 'React-cxxreact', :path => '../node_modules/react-native/ReactCommon/cxxreact'
            pod 'React-jsi', :path => '../node_modules/react-native/ReactCommon/jsi'
            pod 'React-jsiexecutor', :path => '../node_modules/react-native/ReactCommon/jsiexecutor'
            pod 'React-jsinspector', :path => '../node_modules/react-native/ReactCommon/jsinspector'
            pod 'ReactCommon', :path => '../node_modules/react-native/ReactCommon'
            pod 'React-runtimeexecutor', :path => '../node_modules/react-native/ReactCommon/runtimeexecutor'
            pod 'Yoga', :path => '../node_modules/react-native/ReactCommon/yoga'
            pod 'FBLazyVector', :path => '../node_modules/react-native/Libraries/FBLazyVector'
            pod 'RCTRequired', :path => '../node_modules/react-native/Libraries/RCTRequired'
            pod 'RCTTypeSafety', :path => '../node_modules/react-native/Libraries/TypeSafety'
            
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                end
              end
            end
          end
          EOF
          
          echo "✅ Podfile Strategy 1 created"
          cat Podfile
          cd ..

      # ============================================================
      # STEP 9: PODFILE STRATEGY 2 - WITH EXPO MODULES
      # ============================================================
      - name: Podfile Strategy 2 - With Expo Modules
        id: podfile_2
        if: steps.podfile_1.outcome != 'success'
        run: |
          echo "============================================================"
          echo "PODFILE STRATEGY 2: With Expo Modules"
          echo "============================================================"
          cd ios || exit 1
          
          cat > Podfile << 'EOF'
          platform :ios, '13.0'
          
          $RCT_NEW_ARCH_ENABLED = 0
          
          target 'gymapp2' do
            # React Native core
            pod 'React', :path => '../node_modules/react-native'
            pod 'React-Core', :path => '../node_modules/react-native/React'
            pod 'React-RCTActionSheet', :path => '../node_modules/react-native/Libraries/ActionSheetIOS'
            pod 'React-RCTAnimation', :path => '../node_modules/react-native/Libraries/NativeAnimation'
            pod 'React-RCTBlob', :path => '../node_modules/react-native/Libraries/Blob'
            pod 'React-RCTImage', :path => '../node_modules/react-native/Libraries/Image'
            pod 'React-RCTLinking', :path => '../node_modules/react-native/Libraries/LinkingIOS'
            pod 'React-RCTNetwork', :path => '../node_modules/react-native/Libraries/Network'
            pod 'React-RCTSettings', :path => '../node_modules/react-native/Libraries/Settings'
            pod 'React-RCTText', :path => '../node_modules/react-native/Libraries/Text'
            pod 'React-RCTVibration', :path => '../node_modules/react-native/Libraries/Vibration'
            pod 'React-RCTWebSocket', :path => '../node_modules/react-native/Libraries/WebSocket'
            pod 'React-callinvoker', :path => '../node_modules/react-native/ReactCommon/callinvoker'
            pod 'React-cxxreact', :path => '../node_modules/react-native/ReactCommon/cxxreact'
            pod 'React-jsi', :path => '../node_modules/react-native/ReactCommon/jsi'
            pod 'React-jsiexecutor', :path => '../node_modules/react-native/ReactCommon/jsiexecutor'
            pod 'React-jsinspector', :path => '../node_modules/react-native/ReactCommon/jsinspector'
            pod 'ReactCommon', :path => '../node_modules/react-native/ReactCommon'
            pod 'React-runtimeexecutor', :path => '../node_modules/react-native/ReactCommon/runtimeexecutor'
            pod 'Yoga', :path => '../node_modules/react-native/ReactCommon/yoga'
            pod 'FBLazyVector', :path => '../node_modules/react-native/Libraries/FBLazyVector'
            pod 'RCTRequired', :path => '../node_modules/react-native/Libraries/RCTRequired'
            pod 'RCTTypeSafety', :path => '../node_modules/react-native/Libraries/TypeSafety'
            
            # Expo Modules
            pod 'ExpoModulesCore', :path => '../node_modules/expo-modules-core'
            pod 'Expo', :path => '../node_modules/expo'
            
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                end
              end
            end
          end
          EOF
          
          echo "✅ Podfile Strategy 2 created"
          cat Podfile
          cd ..

      # ============================================================
      # STEP 10: PODFILE STRATEGY 3 - SIMPLE WITH AUTOLINKING
      # ============================================================
      - name: Podfile Strategy 3 - Simple with Autolinking
        id: podfile_3
        if: steps.podfile_2.outcome != 'success'
        run: |
          echo "============================================================"
          echo "PODFILE STRATEGY 3: Simple with Autolinking"
          echo "============================================================"
          cd ios || exit 1
          
          cat > Podfile << 'EOF'
          require File.join(File.dirname(`node --print "require.resolve('expo/package.json')"`), "scripts/autolinking")
          require File.join(File.dirname(`node --print "require.resolve('react-native/package.json')"`), "scripts/react_native_pods")
          
          platform :ios, '13.0'
          install! 'cocoapods', :deterministic_uuids => false
          
          $RCT_NEW_ARCH_ENABLED = 0
          
          target 'gymapp2' do
            use_expo_modules!
            config = use_native_modules!
            
            use_react_native!(
              :path => config[:reactNativePath],
              :hermes_enabled => true,
              :fabric_enabled => false
            )
            
            post_install do |installer|
              react_native_post_install(installer)
            end
          end
          EOF
          
          echo "✅ Podfile Strategy 3 created"
          cat Podfile
          cd ..

      # ============================================================
      # STEP 11: INSTALL PODS - STRATEGY 1 (4 METHODS)
      # ============================================================
      - name: Install Pods - Strategy 1 (React Native Only)
        id: pods_1
        run: |
          echo "============================================================"
          echo "INSTALL PODS - STRATEGY 1: React Native Only"
          echo "============================================================"
          sudo gem install cocoapods
          cd ios || exit 1
          
          for i in 1 2 3 4; do
            echo "=== ATTEMPT $i ==="
            case $i in
              1) pod install ;;
              2) pod install --repo-update ;;
              3) pod install --verbose ;;
              4) pod cache clean --all && pod install ;;
            esac
            
            if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
              echo "✅ PODS INSTALLED SUCCESSFULLY"
              echo "PODS_SUCCESS=true" >> $GITHUB_ENV
              exit 0
            fi
            echo "❌ ATTEMPT $i FAILED"
            sleep 3
          done
          echo "PODS_SUCCESS=false" >> $GITHUB_ENV
          cd ..

      # ============================================================
      # STEP 12: INSTALL PODS - STRATEGY 2 (With Expo)
      # ============================================================
      - name: Install Pods - Strategy 2 (With Expo)
        id: pods_2
        if: env.PODS_SUCCESS == 'false'
        run: |
          echo "============================================================"
          echo "INSTALL PODS - STRATEGY 2: With Expo Modules"
          echo "============================================================"
          cd ios || exit 1
          
          # Create Podfile with Expo
          cat > Podfile << 'EOF'
          platform :ios, '13.0'
          
          $RCT_NEW_ARCH_ENABLED = 0
          
          target 'gymapp2' do
            pod 'React', :path => '../node_modules/react-native'
            pod 'React-Core', :path => '../node_modules/react-native/React'
            pod 'React-RCTImage', :path => '../node_modules/react-native/Libraries/Image'
            pod 'React-RCTNetwork', :path => '../node_modules/react-native/Libraries/Network'
            pod 'React-cxxreact', :path => '../node_modules/react-native/ReactCommon/cxxreact'
            pod 'React-jsi', :path => '../node_modules/react-native/ReactCommon/jsi'
            pod 'ExpoModulesCore', :path => '../node_modules/expo-modules-core'
            pod 'Expo', :path => '../node_modules/expo'
            pod 'Yoga', :path => '../node_modules/react-native/ReactCommon/yoga'
            
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                end
              end
            end
          end
          EOF
          
          for i in 1 2 3 4; do
            echo "=== ATTEMPT $i ==="
            case $i in
              1) pod install ;;
              2) pod install --repo-update ;;
              3) pod install --verbose ;;
              4) pod cache clean --all && pod install ;;
            esac
            
            if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
              echo "✅ PODS INSTALLED SUCCESSFULLY"
              echo "PODS_SUCCESS=true" >> $GITHUB_ENV
              exit 0
            fi
            echo "❌ ATTEMPT $i FAILED"
            sleep 3
          done
          echo "PODS_SUCCESS=false" >> $GITHUB_ENV
          cd ..

      # ============================================================
      # STEP 13: INSTALL PODS - STRATEGY 3 (Minimal)
      # ============================================================
      - name: Install Pods - Strategy 3 (Minimal)
        id: pods_3
        if: env.PODS_SUCCESS == 'false'
        run: |
          echo "============================================================"
          echo "INSTALL PODS - STRATEGY 3: Minimal"
          echo "============================================================"
          cd ios || exit 1
          
          cat > Podfile << 'EOF'
          platform :ios, '13.0'
          target 'gymapp2' do
            pod 'React'
            pod 'React-Core'
            pod 'Yoga'
          end
          EOF
          
          for i in 1 2 3; do
            echo "=== ATTEMPT $i ==="
            pod install --repo-update
            if [ -f "Pods/Pods.xcodeproj/project.pbxproj" ]; then
              echo "✅ PODS INSTALLED SUCCESSFULLY"
              echo "PODS_SUCCESS=true" >> $GITHUB_ENV
              exit 0
            fi
            echo "❌ ATTEMPT $i FAILED"
            sleep 3
          done
          echo "PODS_SUCCESS=false" >> $GITHUB_ENV
          cd ..

      # ============================================================
      # STEP 14: FIND WORKSPACE
      # ============================================================
      - name: Find workspace
        id: find_workspace
        run: |
          echo "============================================================"
          echo "FINDING WORKSPACE"
          echo "============================================================"
          cd ios || exit 1
          
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "FOUND_WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=workspace" >> $GITHUB_ENV
            echo "✅ Found workspace: $WORKSPACE"
            echo "✅ Scheme: $SCHEME"
          elif [ -n "$PROJECT" ]; then
            SCHEME=$(basename "$PROJECT" .xcodeproj)
            echo "FOUND_PROJECT=$PROJECT" >> $GITHUB_ENV
            echo "FOUND_SCHEME=$SCHEME" >> $GITHUB_ENV
            echo "BUILD_TYPE=project" >> $GITHUB_ENV
            echo "✅ Found project: $PROJECT"
            echo "✅ Scheme: $SCHEME"
          else
            echo "❌ No iOS project found!"
            ls -la
            exit 1
          fi
          
          cd ..

      # ============================================================
      # STEP 15: BUILD APP (3 METHODS)
      # ============================================================
      - name: Build iOS app - METHOD 1 (Standard)
        id: build_1
        run: |
          echo "============================================================"
          echo "BUILD IOS APP - METHOD 1: Standard"
          echo "============================================================"
          cd ios || exit 1
          rm -rf build
          export RCT_NEW_ARCH_ENABLED=0
          
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 1 SUCCESS"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ BUILD METHOD 1 FAILED"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          fi
          cd ..

      - name: Build iOS app - METHOD 2 (Clean)
        id: build_2
        if: env.BUILD_SUCCESS == 'false'
        run: |
          echo "============================================================"
          echo "BUILD IOS APP - METHOD 2: Clean"
          echo "============================================================"
          cd ios || exit 1
          export RCT_NEW_ARCH_ENABLED=0
          
          xcodebuild clean
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 2 SUCCESS"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ BUILD METHOD 2 FAILED"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          fi
          cd ..

      - name: Build iOS app - METHOD 3 (Additional flags)
        id: build_3
        if: env.BUILD_SUCCESS == 'false'
        run: |
          echo "============================================================"
          echo "BUILD IOS APP - METHOD 3: Additional flags"
          echo "============================================================"
          cd ios || exit 1
          export RCT_NEW_ARCH_ENABLED=0
          
          if [ "$BUILD_TYPE" = "workspace" ]; then
            xcodebuild -workspace "$FOUND_WORKSPACE" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0
          else
            xcodebuild -project "$FOUND_PROJECT" -scheme "$FOUND_SCHEME" -configuration Release -derivedDataPath build -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=NO RCT_NEW_ARCH_ENABLED=0
          fi
          
          if [ -d "build" ] && [ -n "$(find build -name "*.app" -type d 2>/dev/null)" ]; then
            echo "✅ BUILD METHOD 3 SUCCESS"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            exit 0
          else
            echo "❌ ALL BUILD METHODS FAILED!"
            exit 1
          fi
          cd ..

      # ============================================================
      # STEP 16: FIND APP (4 LOCATIONS)
      # ============================================================
      - name: Find app
        id: find_app
        run: |
          echo "============================================================"
          echo "FINDING APP - 4 LOCATIONS"
          echo "============================================================"
          
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          [ -n "$APP_PATH" ] && echo "Found in ios/build: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -maxdepth 3 -name "*.app" -type d | grep -v "Pods" | head -1)
            [ -n "$APP_PATH" ] && echo "Found in root: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
            [ -n "$APP_PATH" ] && echo "Found in DerivedData: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -1)
            [ -n "$APP_PATH" ] && echo "Found anywhere: $APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ No app found anywhere!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "✅ Found app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ============================================================
      # STEP 17: VERIFY APP
      # ============================================================
      - name: Verify app
        run: |
          echo "============================================================"
          echo "VERIFYING APP"
          echo "============================================================"
          
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          
          if [ -f "$APP_PATH/Info.plist" ]; then
            echo "✅ Info.plist found"
          else
            echo "❌ Info.plist missing!"
            exit 1
          fi
          
          echo "✅ App verified"

      # ============================================================
      # STEP 18: CREATE UNSIGNED IPA
      # ============================================================
      - name: Create unsigned IPA
        run: |
          echo "============================================================"
          echo "CREATING UNSIGNED IPA"
          echo "============================================================"
          
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          echo "=== PAYLOAD CONTENTS ==="
          ls -la Payload/
          du -sh Payload/
          
          zip -r gymapp2-unsigned.ipa Payload/
          
          IPA_SIZE=$(stat -f%z "gymapp2-unsigned.ipa" 2>/dev/null || stat -c%s "gymapp2-unsigned.ipa" 2>/dev/null)
          echo "Unsigned IPA size: $IPA_SIZE bytes"
          
          if [ "$IPA_SIZE" -lt 1000000 ]; then
            echo "❌ IPA is too small ($IPA_SIZE bytes)! Build failed."
            exit 1
          fi
          
          echo "✅ Unsigned IPA created successfully!"

      # ============================================================
      # STEP 19: DOWNLOAD ZSIGN
      # ============================================================
      - name: Download zsign
        run: |
          echo "============================================================"
          echo "DOWNLOADING ZSIGN"
          echo "============================================================"
          curl -L -o zsign https://github.com/zhlynn/zsign/releases/latest/download/zsign-macos
          chmod +x zsign
          if [ -f "zsign" ]; then
            echo "✅ zsign downloaded"
          else
            echo "❌ zsign download failed"
            exit 1
          fi

      # ============================================================
      # STEP 20: FIND CERTIFICATE AND PROFILE
      # ============================================================
      - name: Find certificate and profile
        id: find_cert
        run: |
          echo "============================================================"
          echo "FINDING CERTIFICATE AND PROFILE"
          echo "============================================================"
          
          CERT_FILE=$(ls *.p12 2>/dev/null | head -1)
          if [ -z "$CERT_FILE" ]; then
            echo "❌ No .p12 certificate found!"
            ls -la
            exit 1
          fi
          echo "✅ Found certificate: $CERT_FILE"
          echo "CERT_FILE=$CERT_FILE" >> $GITHUB_ENV
          
          PROFILE_FILE=$(ls *.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "❌ No .mobileprovision file found!"
            ls -la
            exit 1
          fi
          echo "✅ Found profile: $PROFILE_FILE"
          echo "PROFILE_FILE=$PROFILE_FILE" >> $GITHUB_ENV

      # ============================================================
      # STEP 21: SIGN THE IPA (3 METHODS)
      # ============================================================
      - name: Sign IPA (3 METHODS)
        run: |
          echo "============================================================"
          echo "SIGNING IPA - 3 METHODS"
          echo "============================================================"
          echo "Certificate: ${{ env.CERT_FILE }}"
          echo "Profile: ${{ env.PROFILE_FILE }}"
          echo "============================================================"
          
          PASSWORD="Uhjiply-7643"
          
          echo "=== SIGN METHOD 1: Standard signing ==="
          ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 1 SUCCESS"
            exit 0
          else
            echo "❌ SIGN METHOD 1 FAILED"
          fi
          
          echo "=== SIGN METHOD 2: Signing with compression ==="
          ./zsign -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -z 9 -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 2 SUCCESS"
            exit 0
          else
            echo "❌ SIGN METHOD 2 FAILED"
          fi
          
          echo "=== SIGN METHOD 3: Signing with verbose ==="
          ./zsign -v -k "${{ env.CERT_FILE }}" -p "$PASSWORD" -m "${{ env.PROFILE_FILE }}" -o "gymapp2-signed.ipa" "gymapp2-unsigned.ipa"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            echo "✅ SIGN METHOD 3 SUCCESS"
            exit 0
          else
            echo "❌ ALL SIGN METHODS FAILED!"
            exit 1
          fi

      # ============================================================
      # STEP 22: VERIFY SIGNED IPA
      # ============================================================
      - name: Verify signed IPA
        run: |
          echo "============================================================"
          echo "VERIFYING SIGNED IPA"
          echo "============================================================"
          
          if [ -f "gymapp2-signed.ipa" ] && [ -s "gymapp2-signed.ipa" ]; then
            SIZE=$(stat -f%z "gymapp2-signed.ipa" 2>/dev/null || stat -c%s "gymapp2-signed.ipa" 2>/dev/null)
            echo "✅ Signed IPA is valid!"
            echo "Size: $SIZE bytes"
          else
            echo "❌ Signed IPA is missing or empty!"
            exit 1
          fi

      # ============================================================
      # STEP 23: UPLOAD UNSIGNED IPA
      # ============================================================
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-unsigned-ipa
          path: gymapp2-unsigned.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 24: UPLOAD SIGNED IPA
      # ============================================================
      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: gymapp2-signed-ipa
          path: gymapp2-signed.ipa
          compression-level: 9
          retention-days: 30

      # ============================================================
      # STEP 25: UPLOAD BUILD LOGS
      # ============================================================
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/build/**/*.log
            ios/Podfile.lock
            ios/Pods/
            package.json
            app.json
            prebuild_log.txt
          retention-days: 7

      # ============================================================
      # STEP 26: SUCCESS MESSAGE
      # ============================================================
      - name: Build and sign complete!
        if: success()
        run: |
          echo "============================================================"
          echo "🎉🎉🎉 BUILD AND SIGN COMPLETE! 🎉🎉🎉"
          echo "============================================================"
          echo "📦 UNSIGNED IPA: gymapp2-unsigned-ipa (Backup)"
          echo "📦 SIGNED IPA: gymapp2-signed-ipa (READY TO INSTALL)"
          echo "============================================================"
          echo "NEXT STEPS:"
          echo "1. Download gymapp2-signed-ipa from Artifacts"
          echo "2. AirDrop to your iPhone"
          echo "3. Open with AltStore"
          echo "4. Tap Install"
          echo "5. Trust the certificate in Settings → General → VPN & Device Management"
          echo "6. Launch the app!"
          echo "============================================================"
          echo "SIGNED IPA SIZE:"
          ls -la gymapp2-signed.ipa
          echo "============================================================"

      # ============================================================
      # STEP 27: DEBUG ON FAILURE
      # ============================================================
      - name: Debug on failure
        if: failure()
        run: |
          echo "============================================================"
          echo "❌❌❌ BUILD OR SIGN FAILED ❌❌❌"
          echo "============================================================"
          echo "=== ALL FILES ==="
          ls -la
          echo "=== IOS FOLDER ==="
          ls -la ios/ 2>/dev/null || echo "No ios folder"
          echo "=== APP FILE ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== IPA FILES ==="
          find . -name "*.ipa" -type f 2>/dev/null
          echo "=== CERTIFICATE FILES ==="
          ls -la *.p12 2>/dev/null || echo "No .p12 files"
          echo "=== PROFILE FILES ==="
          ls -la *.mobileprovision 2>/dev/null || echo "No .mobileprovision files"
          echo "=== PREBUILD LOG ==="
          cat prebuild_log.txt 2>/dev/null || echo "No prebuild log"
          echo "============================================================"
          echo "Download build-logs to see what went wrong"
          echo "============================================================"
